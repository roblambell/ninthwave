name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  compile:
    name: Compile smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build binary
        run: bun run build
      - name: Smoke test — packaged orchestration startup
        run: bun run smoke:compiled-orchestrate-startup

  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [test, compile]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.test.result }}" == "cancelled" ]]; then
            echo "::error::CI failed -- test=${{ needs.test.result }}"
            exit 1
          fi
          if [[ "${{ needs.compile.result }}" == "failure" || "${{ needs.compile.result }}" == "cancelled" ]]; then
            echo "::error::CI failed -- compile=${{ needs.compile.result }}"
            exit 1
          fi
          echo "CI passed -- test=${{ needs.test.result }}, compile=${{ needs.compile.result }}"
